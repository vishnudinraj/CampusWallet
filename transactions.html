      <a href="converter.html" class="nav-item">

        Ramadan & Eid

    <button class="theme-toggle" onclick="toggleTheme()">
      <span class="tt-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
      <span class="tt-label">Dark Mode</span>
    </button>
    <button class="logout-btn" onclick="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Logout
    </button>
    <div class="tip-card">
      <div class="tip-header">
        <span class="tip-icon">💡</span>
        <span class="tip-label">Tip of the day</span>
      </div>
      <p class="tip-text">Track your Metro/bus costs — they add up faster than you think!</p>
    </div>
  </aside>

  <main class="main">
    <div class="tx-page-header">
      <div>
        <h1>Transactions</h1>
        <p class="page-sub" id="txCount">0 transactions</p>
      </div>
      <a href="add-transaction.html" class="btn-add">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add
      </a>
    </div>

    <div class="card">
      <!-- Search & filters -->
      <div class="tx-filters">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Search transactions..." />
        </div>
        <div class="filter-group">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="filter-icon"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          <select id="periodFilter">
            <option value="all">All</option>
            <option value="month">This Month</option>
            <option value="last">Last Month</option>
          </select>
          <select id="typeFilter">
            <option value="all">All Types</option>
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
        </div>
      </div>

      <!-- Net total row -->
      <div class="net-total-row">
        <span class="net-label">Net Total</span>
        <span class="net-value" id="netTotal">AED 0.00</span>
      </div>

      <!-- Transaction list -->
      <div id="txList"></div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    initTheme();
    if (!getSession()) { window.location.replace('login.html'); }
    let allTxns = loadTxns();

    function filtered() {
      const q      = document.getElementById('searchInput').value.toLowerCase();
      const period = document.getElementById('periodFilter').value;
      const type   = document.getElementById('typeFilter').value;
      const now    = new Date();
      const thisM  = now.getMonth();
      const thisY  = now.getFullYear();

      return allTxns.filter(t => {
        if (q && !t.title.toLowerCase().includes(q) && !t.category.toLowerCase().includes(q)) return false;
        if (type === 'expense' && t.amount >= 0) return false;
        if (type === 'income'  && t.amount <  0) return false;
        if (period !== 'all') {
          const d = new Date(t.date);
          if (period === 'month' && (d.getMonth() !== thisM || d.getFullYear() !== thisY)) return false;
          if (period === 'last') {
            const lm = thisM === 0 ? 11 : thisM - 1;
            const ly = thisM === 0 ? thisY - 1 : thisY;
            if (d.getMonth() !== lm || d.getFullYear() !== ly) return false;
          }
        }
        return true;
      });
    }

    function render() {
      const txns = filtered();
      const total = txns.reduce((s, t) => s + t.amount, 0);

      document.getElementById('txCount').textContent = `${allTxns.length} transaction${allTxns.length !== 1 ? 's' : ''}`;
      const netEl = document.getElementById('netTotal');
      netEl.textContent = fmt(total);
      netEl.style.color = total < 0 ? '#ef4444' : '#1a9b7b';

      const list = document.getElementById('txList');
      if (!txns.length) {
        list.innerHTML = `<p class="empty-state" style="padding:24px 0">No transactions found.</p>`;
        return;
      }

      const todayStr = today();
      list.innerHTML = txns.map(tx => {
        const cat = getCat(tx.category);
        const scheduled = tx.date > todayStr;
        const hasFx = tx.origCurrency && tx.origCurrency !== 'AED';
        const fxLabel = hasFx
          ? `<span class="tx-fx">${getCurrencyInfo(tx.origCurrency).flag} ${tx.origCurrency} ${Math.abs(tx.origAmount).toFixed(2)}</span>`
          : '';
        return `
          <div class="tx-row${scheduled ? ' tx-scheduled' : ''}">
            <div class="tx-icon" style="background:${cat.bg};color:${cat.color}">${cat.emoji}</div>
            <div class="tx-body">
              <div class="tx-name">${tx.title}${scheduled ? ' <span class="badge-scheduled">Scheduled</span>' : ''}</div>
              <div class="tx-cat">${tx.category}${fxLabel}</div>
            </div>
            <div class="tx-right">
              <div class="tx-amount ${tx.amount >= 0 ? 'pos' : 'neg'}">${fmtSigned(tx.amount)}</div>
              <div class="tx-date">${tx.date}</div>
            </div>
            <button class="tx-delete" onclick="deleteTx('${tx.id}')" title="Delete">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>`;
      }).join('');
    }

    function deleteTx(id) {
      if (!confirm('Delete this transaction?')) return;
      allTxns = allTxns.filter(t => t.id !== id);
      saveTxns(allTxns);
      render();
    }

    document.getElementById('searchInput').addEventListener('input', render);
    document.getElementById('periodFilter').addEventListener('change', render);
    document.getElementById('typeFilter').addEventListener('change', render);

    render();
  </script>
</body>
</html>
