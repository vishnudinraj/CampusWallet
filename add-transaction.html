        Ramadan & Eid

    <button class="theme-toggle" onclick="toggleTheme()">
      <span class="tt-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
      <span class="tt-label">Dark Mode</span>
    </button>
    <button class="logout-btn" onclick="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Logout
    </button>
    <div class="tip-card">
      <div class="tip-header">
        <span class="tip-icon">💡</span>
        <span class="tip-label">Tip of the day</span>
      </div>
      <p class="tip-text">Track your Metro/bus costs — they add up faster than you think!</p>
    </div>

  <main class="main add-tx-main">
    <div class="add-tx-header">
      <a href="transactions.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <h1>Add Transaction</h1>
    </div>

    <div class="add-tx-card card">
      <!-- Expense / Income toggle -->
      <div class="type-toggle">
        <button class="type-btn active expense-btn" id="btnExpense" onclick="setType('expense')">Expense</button>
        <button class="type-btn income-btn"          id="btnIncome"  onclick="setType('income')">Income</button>
      </div>

      <form id="txForm" onsubmit="saveTransaction(event)">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="txTitle" placeholder="e.g. Metro card recharge" required />
        </div>

        <div class="form-group">
          <label>Amount</label>
          <div class="mc-amount-row">
            <input type="number" id="txAmount" placeholder="0.00" step="0.01" min="0.01" required />
            <div class="mc-curr-wrap" id="mcCurrWrap">
              <div class="mc-trigger" id="mcTrigger" onclick="toggleMcDrop()">
                <span id="mcFlag">🇦🇪</span>
                <span id="mcCode">AED</span>
                <svg class="cs-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
              </div>
              <div class="mc-dropdown" id="mcDrop"></div>
            </div>
          </div>
          <div class="mc-preview" id="mcPreview" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px;flex-shrink:0"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            <span id="mcPreviewText"></span>
          </div>
        </div>

        <div class="form-group">
          <label>Category</label>
          <div class="custom-select" id="customSelect">
            <div class="cs-trigger" id="csTrigger" onclick="toggleDropdown()">
              <span id="csLabel">Select category</span>
              <svg class="cs-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="cs-dropdown" id="csDropdown"></div>
          </div>
          <input type="hidden" id="txCategory" required />
        </div>

        <div class="form-group">
          <label>Date</label>
          <input type="date" id="txDate" required />
        </div>

        <div class="form-group">
          <label>Notes <span class="optional">(optional)</span></label>
          <textarea id="txNotes" placeholder="Any extra details..." rows="3"></textarea>
        </div>

        <button type="submit" class="btn-primary">Save Transaction</button>
      </form>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    initTheme();
    if (!getSession()) { window.location.replace('login.html'); }
    // Set default date to today
    document.getElementById('txDate').value = today();

    // Read ?type= param
    const params = new URLSearchParams(location.search);
    let txType = params.get('type') === 'income' ? 'income' : 'expense';
    setType(txType);

    function setType(t) {
      txType = t;
      document.getElementById('btnExpense').classList.toggle('active', t === 'expense');
      document.getElementById('btnIncome').classList.toggle('active',  t === 'income');
      // Re-build dropdown for the selected type
      buildDropdown();
    }

    // Custom dropdown
    let dropdownOpen = false;

    const RAMADAN_FIRST = ['Iftar / Suhoor', 'Sadaqah', 'Zakat & Charity', 'Eid & Gifts', 'Eid Travel', 'Eid Celebrations'];

    function buildDropdown() {
      const dd = document.getElementById('csDropdown');

      if (txType === 'income') {
        const incomeOnly = [
          { name: 'Salary / Allowance', color: '#1a9b7b' },
          { name: 'Part-time Job',      color: '#059669' },
          { name: 'Gift / Money',       color: '#d97706' },
        ];
        dd.innerHTML = incomeOnly.concat(CATEGORIES).map(c => `
          <div class="cs-option" style="color:${c.color}" data-name="${c.name}" onclick="selectCat('${c.name}')">
            ${c.emoji ? c.emoji + ' ' : ''}${c.name}
          </div>`).join('');
        return;
      }

      // During Ramadan, pin seasonal categories to the top
      const inRamadan = getCurrentRamadan() !== null;
      let ordered = [...CATEGORIES];
      if (inRamadan) {
        const top    = ordered.filter(c => RAMADAN_FIRST.includes(c.name));
        const rest   = ordered.filter(c => !RAMADAN_FIRST.includes(c.name));
        ordered      = [...top, ...rest];
        dd.innerHTML = `<div class="cs-option cs-opt-header">🌙 Ramadan categories</div>` +
          top.map(c => `<div class="cs-option" style="color:${c.color}" onclick="selectCat('${c.name}')">${c.emoji} ${c.name}</div>`).join('') +
          `<div class="cs-option cs-opt-header">All categories</div>` +
          rest.map(c => `<div class="cs-option" style="color:${c.color}" onclick="selectCat('${c.name}')">${c.emoji ? c.emoji + ' ' : ''}${c.name}</div>`).join('');
        return;
      }

      dd.innerHTML = ordered.map(c => `
        <div class="cs-option" style="color:${c.color}" data-name="${c.name}" onclick="selectCat('${c.name}')">
          ${c.emoji ? c.emoji + ' ' : ''}${c.name}
        </div>`).join('');
    }

    function toggleDropdown() {
      dropdownOpen = !dropdownOpen;
      document.getElementById('csDropdown').classList.toggle('open', dropdownOpen);
      document.getElementById('csTrigger').classList.toggle('open', dropdownOpen);
    }

    function selectCat(name) {
      document.getElementById('csLabel').textContent = name;
      const cat = CATEGORIES.find(c => c.name === name) || { color: '#1f2937' };
      document.getElementById('csLabel').style.color = cat.color || '#1a9b7b';
      document.getElementById('txCategory').value = name;
      dropdownOpen = false;
      document.getElementById('csDropdown').classList.remove('open');
      document.getElementById('csTrigger').classList.remove('open');
    }

    // Close category dropdown on outside click
    document.addEventListener('click', (e) => {
      if (!document.getElementById('customSelect').contains(e.target)) {
        dropdownOpen = false;
        document.getElementById('csDropdown').classList.remove('open');
        document.getElementById('csTrigger').classList.remove('open');
      }
      if (!document.getElementById('mcCurrWrap').contains(e.target)) {
        document.getElementById('mcDrop').classList.remove('open');
        document.getElementById('mcTrigger').classList.remove('open');
        mcDropOpen = false;
      }
    });

    // ── Multi-currency ──
    let txCurrency  = 'AED';
    let mcDropOpen  = false;
    let cachedRates = null;

    function buildMcDrop() {
      document.getElementById('mcDrop').innerHTML = CURRENCIES.map(c => `
        <div class="mc-opt${c.code === txCurrency ? ' mc-opt-sel' : ''}"
             onclick="selectMcCurrency('${c.code}')">
          <span>${c.flag}</span>
          <span class="mc-opt-code">${c.code}</span>
          <span class="mc-opt-name">${c.name}</span>
        </div>`).join('');
    }

    function toggleMcDrop() {
      mcDropOpen = !mcDropOpen;
      document.getElementById('mcDrop').classList.toggle('open', mcDropOpen);
      document.getElementById('mcTrigger').classList.toggle('open', mcDropOpen);
      if (mcDropOpen) buildMcDrop();
    }

    function selectMcCurrency(code) {
      txCurrency = code;
      const c = getCurrencyInfo(code);
      document.getElementById('mcFlag').textContent = c.flag;
      document.getElementById('mcCode').textContent = code;
      mcDropOpen = false;
      document.getElementById('mcDrop').classList.remove('open');
      document.getElementById('mcTrigger').classList.remove('open');
      updateMcPreview();
    }

    async function updateMcPreview() {
      const amountEl = document.getElementById('txAmount');
      const preview  = document.getElementById('mcPreview');
      const previewTxt = document.getElementById('mcPreviewText');

      if (txCurrency === 'AED') { preview.style.display = 'none'; return; }

      const raw = parseFloat(amountEl.value);
      if (!raw || raw <= 0) { preview.style.display = 'none'; return; }

      preview.style.display = 'flex';
      previewTxt.textContent = 'Converting…';

      if (!cachedRates) cachedRates = await getAedRates();
      const rate = cachedRates[txCurrency];
      if (!rate) { previewTxt.textContent = 'Rate unavailable'; return; }

      const aed = raw / rate;
      previewTxt.textContent = `≈ AED ${aed.toFixed(2)} (live rate)`;
    }

    document.getElementById('txAmount').addEventListener('input', updateMcPreview);

    async function saveTransaction(e) {
      e.preventDefault();
      const cat = document.getElementById('txCategory').value;
      if (!cat) { alert('Please select a category.'); return; }

      const rawAmount = parseFloat(document.getElementById('txAmount').value);
      let aedAmount   = rawAmount;

      if (txCurrency !== 'AED') {
        if (!cachedRates) cachedRates = await getAedRates();
        const rate = cachedRates[txCurrency];
        aedAmount  = rate ? rawAmount / rate : rawAmount;
      }

      const tx = {
        id:           Date.now().toString(),
        title:        document.getElementById('txTitle').value.trim(),
        category:     cat,
        amount:       txType === 'expense' ? -aedAmount : aedAmount,
        date:         document.getElementById('txDate').value,
        notes:        document.getElementById('txNotes').value.trim(),
        origCurrency: txCurrency,
        origAmount:   txType === 'expense' ? -rawAmount : rawAmount,
      };

      const txns = loadTxns();
      txns.unshift(tx);
      saveTxns(txns);
      window.location.href = 'transactions.html';
    }

    buildDropdown();
    const preselectedCat = params.get('cat');
    if (preselectedCat) selectCat(preselectedCat);
  </script>
</body>
</html>
