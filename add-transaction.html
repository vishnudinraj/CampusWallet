<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusWallet – Add Transaction</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">

      <div>
        <div class="logo-title">CampusWallet</div>
        <div class="logo-sub">UAE Edition</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="transactions.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        Transactions
      </a>
      <a href="budgets.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Budgets
      </a>
      <a href="goals.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        Goals
      </a>
      <a href="finlearn.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        FinLearn
      </a>
      <a href="converter.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Converter
      </a>
      <a href="zakat.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Zakat
      </a>
    </nav>
    <button class="theme-toggle" onclick="toggleTheme()">
      <span class="tt-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
      <span class="tt-label">Dark Mode</span>
    </button>
    <button class="logout-btn" onclick="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Logout
    </button>
    <div class="tip-card">
      <div class="tip-header">
        <span class="tip-icon">💡</span>
        <span class="tip-label">Tip of the day</span>
      </div>
      <p class="tip-text">Track your Metro/bus costs — they add up faster than you think!</p>
    </div>
  </aside>

  <main class="main add-tx-main">
    <div class="add-tx-header">
      <a href="transactions.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <h1>Add Transaction</h1>
    </div>

    <div class="add-tx-card card">
      <!-- Expense / Income toggle -->
      <div class="type-toggle">
        <button class="type-btn active expense-btn" id="btnExpense" onclick="setType('expense')">Expense</button>
        <button class="type-btn income-btn"          id="btnIncome"  onclick="setType('income')">Income</button>
      </div>

      <form id="txForm" onsubmit="saveTransaction(event)">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="txTitle" placeholder="e.g. Metro card recharge" required />
        </div>

        <div class="form-group">
          <label>Amount (AED)</label>
          <input type="number" id="txAmount" placeholder="0.00" step="0.01" min="0.01" required />
        </div>

        <div class="form-group">
          <label>Category</label>
          <div class="custom-select" id="customSelect">
            <div class="cs-trigger" id="csTrigger" onclick="toggleDropdown()">
              <span id="csLabel">Select category</span>
              <svg class="cs-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="cs-dropdown" id="csDropdown"></div>
          </div>
          <input type="hidden" id="txCategory" required />
        </div>

        <div class="form-group">
          <label>Date</label>
          <input type="date" id="txDate" required />
        </div>

        <div class="form-group">
          <label>Notes <span class="optional">(optional)</span></label>
          <textarea id="txNotes" placeholder="Any extra details..." rows="3"></textarea>
        </div>

        <button type="submit" class="btn-primary">Save Transaction</button>
      </form>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    initTheme();
    if (!getSession()) { window.location.replace('login.html'); }
    // Set default date to today
    document.getElementById('txDate').value = today();

    // Read ?type= param
    const params = new URLSearchParams(location.search);
    let txType = params.get('type') === 'income' ? 'income' : 'expense';
    setType(txType);

    function setType(t) {
      txType = t;
      document.getElementById('btnExpense').classList.toggle('active', t === 'expense');
      document.getElementById('btnIncome').classList.toggle('active',  t === 'income');
      // Re-build dropdown for the selected type
      buildDropdown();
    }

    // Custom dropdown
    let dropdownOpen = false;

    function buildDropdown() {
      const dd = document.getElementById('csDropdown');
      dd.innerHTML = CATEGORIES.map(c => `
        <div class="cs-option" style="color:${c.color}" data-name="${c.name}" onclick="selectCat('${c.name}')">
          ${c.name}
        </div>`).join('');

      // Add income-specific options when income is selected
      if (txType === 'income') {
        const incomeOnly = [
          { name: 'Salary / Allowance', color: '#1a9b7b' },
          { name: 'Part-time Job',      color: '#059669' },
          { name: 'Gift / Money',       color: '#d97706' },
        ];
        dd.innerHTML = incomeOnly.concat(CATEGORIES).map(c => `
          <div class="cs-option" style="color:${c.color}" data-name="${c.name}" onclick="selectCat('${c.name}')">
            ${c.name}
          </div>`).join('');
      }
    }

    function toggleDropdown() {
      dropdownOpen = !dropdownOpen;
      document.getElementById('csDropdown').classList.toggle('open', dropdownOpen);
      document.getElementById('csTrigger').classList.toggle('open', dropdownOpen);
    }

    function selectCat(name) {
      document.getElementById('csLabel').textContent = name;
      const cat = CATEGORIES.find(c => c.name === name) || { color: '#1f2937' };
      document.getElementById('csLabel').style.color = cat.color || '#1a9b7b';
      document.getElementById('txCategory').value = name;
      dropdownOpen = false;
      document.getElementById('csDropdown').classList.remove('open');
      document.getElementById('csTrigger').classList.remove('open');
    }

    // Close dropdown on outside click
    document.addEventListener('click', (e) => {
      if (!document.getElementById('customSelect').contains(e.target)) {
        dropdownOpen = false;
        document.getElementById('csDropdown').classList.remove('open');
        document.getElementById('csTrigger').classList.remove('open');
      }
    });

    function saveTransaction(e) {
      e.preventDefault();
      const cat = document.getElementById('txCategory').value;
      if (!cat) { alert('Please select a category.'); return; }

      const amount = parseFloat(document.getElementById('txAmount').value);
      const tx = {
        id:       Date.now().toString(),
        title:    document.getElementById('txTitle').value.trim(),
        category: cat,
        amount:   txType === 'expense' ? -amount : amount,
        date:     document.getElementById('txDate').value,
        notes:    document.getElementById('txNotes').value.trim(),
      };

      const txns = loadTxns();
      txns.unshift(tx);
      saveTxns(txns);
      window.location.href = 'transactions.html';
    }

    buildDropdown();
  </script>
</body>
</html>
