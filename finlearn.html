      Logout

    <div class="tip-card">
      <div class="tip-header">
        <span class="tip-icon">💡</span>
        <span class="tip-label">Tip of the day</span>

      <p class="tip-text">Track your Metro/bus costs — they add up faster than you think!</p>
    </div>

  <main class="main">
    <div class="tx-page-header">
      <div>
        <h1>FinLearn</h1>
        <p class="page-sub">Build your financial knowledge, one tip at a time</p>
      </div>
    </div>

    <!-- Overall Progress -->
    <div class="fl-overall-progress">
      <div class="fl-overall-header">
        <span class="fl-overall-title">Your Progress</span>
        <span class="fl-overall-count" id="flCount">0 / 20 read</span>
      </div>
      <div class="fl-overall-bar-wrap">
        <div class="fl-overall-bar" id="flBar" style="width:0%"></div>
      </div>
    </div>

    <!-- Tips grid -->
    <div class="fl-grid" id="flGrid"></div>
  </main>

  <!-- Tip Modal -->
  <div class="modal-overlay" id="tipOverlay" onclick="handleTipOverlay(event)">
    <div class="modal tip-modal">
      <div class="modal-header">
        <div></div>
        <button class="modal-close" onclick="closeTipModal()">✕</button>
      </div>
      <div class="tip-modal-icon-wrap">
        <div class="tip-modal-icon" id="tipModalIcon"></div>
        <div class="tip-modal-meta">
          <div class="tip-modal-cat" id="tipModalCat"></div>
          <div class="tip-modal-title" id="tipModalTitle"></div>
        </div>
      </div>
      <div class="tip-modal-content" id="tipModalContent"></div>
      <button class="btn-gotit" id="gotitBtn" onclick="handleTipRead()">Got it! ✓</button>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    initTheme();
    if (!getSession()) { window.location.replace('login.html'); }
    let activeTipId = null;

    function renderFinlearn() {
      const read  = loadReadTips();
      const total = TIPS.length;
      const readCount = read.size;
      const pct = total > 0 ? Math.round((readCount / total) * 100) : 0;

      document.getElementById('flCount').textContent  = `${readCount} / ${total} read`;
      document.getElementById('flBar').style.width    = `${pct}%`;

      document.getElementById('flGrid').innerHTML = TIPS.map(t => {
        const isRead = read.has(t.id);
        return `
          <div class="fl-card${isRead ? ' fl-read' : ''}" onclick="openTipModal('${t.id}')">
            ${isRead ? '<span class="fl-read-badge">✓ Read</span>' : ''}
            <div class="fl-card-top">
              <div class="fl-card-icon" style="background:${t.bg}">${t.icon}</div>
              <div class="fl-card-meta">
                <span class="fl-card-cat" style="background:${t.bg};color:${t.color}">${t.category}</span>
                <div class="fl-card-title">${t.title}</div>
              </div>
            </div>
            <div class="fl-card-summary">${t.summary}</div>
            <div class="fl-card-cta">${isRead ? 'Re-read →' : 'Tap to read →'}</div>
          </div>`;
      }).join('');
    }

    function openTipModal(id) {
      const tip = TIPS.find(t => t.id === id);
      if (!tip) return;
      activeTipId = id;
      const isRead = loadReadTips().has(id);

      document.getElementById('tipModalIcon').textContent      = tip.icon;
      document.getElementById('tipModalIcon').style.background = tip.bg;
      document.getElementById('tipModalCat').textContent       = tip.category;
      document.getElementById('tipModalCat').style.background  = tip.bg;
      document.getElementById('tipModalCat').style.color       = tip.color;
      document.getElementById('tipModalTitle').textContent     = tip.title;
      document.getElementById('tipModalContent').textContent   = tip.content;

      const btn = document.getElementById('gotitBtn');
      btn.textContent = isRead ? 'Already read ✓' : 'Got it! ✓';
      btn.style.background = isRead ? '#059669' : '';

      document.getElementById('tipOverlay').classList.add('open');
    }

    function closeTipModal() {
      document.getElementById('tipOverlay').classList.remove('open');
      activeTipId = null;
    }

    function handleTipOverlay(e) {
      if (e.target === document.getElementById('tipOverlay')) closeTipModal();
    }

    function handleTipRead() {
      if (activeTipId) markTipRead(activeTipId);
      closeTipModal();
      renderFinlearn();
    }

    renderFinlearn();
  </script>
</body>
</html>
